<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google font - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/sign-up.css" />

    <title>Sign Up | Spotify</title>
</head>
<body>
    <section class="hero">
        <div class="hero-container">
            <div class="hero-header">
                <div class="hero-header-logo">
                    <img src="images/logo.svg" alt="logo">
                </div>                
            </div>
            <div class="hero-body">
                <h1 class="hero-body-title">
                    Sign up to start listening
                </h1>
                <form class="hero-body-sign-up-form">
                    <label class="hero-body-sign-up-form-email-label" for="email">Email address </label>
                    <input class="hero-body-sign-up-form-email-input" type="email" name="input-email" id="email" placeholder="name@domain.com" required>
                    <label class="hero-body-sign-up-form-password-label" for="password">Password address </label>
                    <input class="hero-body-sign-up-form-password-input" type="password" name="input-password" id="password"  required>
                    <input class="hero-body-sign-up-form-btn" type="submit" value="Next">
                </form>
                <div class="hero-body-sign-up-actions">
                    <p class="hero-body-sign-up-text">
                        or
                    </p>
                    <a href="index.html" class="hero-body-sign-up-action-btn">
                        <img src="images/google.svg" alt="google.svg">
                        Sign up with Google
                    </a>
                    <a href="index.html" class="hero-body-sign-up-action-btn">
                        
                        <img src="images/apple.svg" alt="apple.svg">
                        Sign up with Apple
                    </a>

                </div>
                <div class="hero-body-sign-up-login-link">
                    <p class="hero-body-sign-up-text">
                        Already have an account?
                    </p>
                    <a class="hero-body-sign-up-login-link-btn" href="login-page.html">Log In</a>
                </div>
            </div>
            <div class="hero-footer">
                <p class="hero-footer-text">
                    This site is protected by reCAPTCHA and the Google
                </p>
                <span class="hero-footer-text hero-footer-text-underline">
                    Privacy Policy
                </span>
                <span class="hero-footer-text">
                    and
                </span>
                <span class=" hero-footer-text hero-footer-text-underline">
                    Terms of Service
                </span>
                <span class="hero-footer-text">
                    apply.
                </span> 
            </div>
        </div>

        
    </section>
    <script src="/js/sign-in.js"></script>
</body>
</html>
